name: proximity_fix
description: Aplicativo Flutter para manter a tela ligada quando o sensor de proximidade está com defeito.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Gerenciamento de estado
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Manter tela ligada
  wakelock_plus: ^1.1.4
  
  # Sensor de proximidade
  sensors_plus: ^4.0.2
  
  # Serviço em background com notificação persistente
  flutter_foreground_task: ^8.14.3
  
  # Permissões do sistema
  permission_handler: ^11.3.0
  
  # Armazenamento local
  shared_preferences: ^2.2.2
  
  # Roteamento
  go_router: ^13.1.0
  
  # Utilitários
  cupertino_icons: ^1.0.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  fonts:
    family: Roboto
    fonts:
      - asset: fonts/Roboto-Regular.ttf
      - asset: fonts/Roboto-Bold.ttf
        weight: 700
