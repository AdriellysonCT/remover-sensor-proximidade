name: proximity_fix
description: Um aplicativo Flutter para resolver problemas com o sensor de proximidade no Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.9
  wakelock_plus: ^1.1.4
  sensors_plus: ^4.0.2
  flutter_foreground_task: ^8.14.3
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  go_router: ^13.1.0
  collection: ^1.18.0
  vibration: ^1.9.0+1
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
